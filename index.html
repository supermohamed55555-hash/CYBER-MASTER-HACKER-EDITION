<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <!-- Matrix rain canvas background -->
    <canvas id="matrixCanvas"></canvas>

    <!-- Scanline effect overlay -->

        </header>

        <main class="grid-container" id="modules-container">
            <!-- Cards will be dynamically injected here by JS -->
        </main>
        
        <footer>
            <div class="terminal-prompt" style="margin-bottom: 2rem;">
                <span>root@cyber-master:~#</span>
                <span class="typing-text">./initiate_learning_protocol.sh</span>
                <span class="cursor"></span>

                    <a href="https://github.com/supermohamed55555-hash" target="_blank" class="social-btn github-btn">GITHUB</a>

    <script src="script.js"></script>
